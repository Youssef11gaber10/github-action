name: ci.yml

env:
  CONTAINER_NAME: my-task-container
  APP_PORT: "8000"
  EC2_HOST: 13.53.144.66

on:
  workflow_dispatch:

  pull_request:
    types:
      - closed 
    branches:
      - main

jobs:    
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6      

      - name: Start container FROM IMAGE ON ECR
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            767196576807.dkr.ecr.eu-north-1.amazonaws.com/task-img:latest

      - name: Smoke test deployed app
        # Retry a few times because app startup can take a moment.
        run: |
          docker ps
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always() # can be failed ,sucess or cancelled -> if all steps before success trigger this step , or one failed trigger this step ,or always either success or fail 
        # Clean up even if an earlier step fails.
        run: docker rm -f "${CONTAINER_NAME}" || true







