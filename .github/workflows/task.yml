# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: task.yml

on:
  workflow_dispatch:

  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  trivy_scan:
  

    # runs-on: ubuntu-latest
    runs-on: ubuntu-latest




    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: install trivy 
        run: sudo apt-get install trivy

      - name: check trivy is installed 
        run: trivy --version

      - name: check fs
        run: trivy fs . 

      - name: check docker file 
        run: trivy config Dockerfile 

      - name : install python to install ruff 
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      
      - name: validate python version
        run: python --version

      - name: install ruff 
        run : pip install ruff

      - name: check ruff 
        run: ruff --version

      - name: do lint with ruff 
        run : ruff check .

      - name: build docker file 
        run : docker build -t task-img .
      
      - name: Scan Docker image
        run: trivy image task-img

      - name: save docker image 
        run : docker save task-img -o task-img.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-img-artifact
          path: task-img.tar
      
      - name: Load Docker image
        run: docker load -i task-img.tar

      - name: Scan loaded image
        run: trivy image task-img


        







