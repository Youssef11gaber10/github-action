# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: task.yml

env:
  CONTAINER_NAME: my-task-container
  APP_PORT: "8000"

on:
  workflow_dispatch:

  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  trivy_scan:
  

    # runs-on: ubuntu-latest
    runs-on: ubuntu-latest




    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: install trivy 
        run: sudo apt-get install trivy

      - name: check trivy is installed 
        run: trivy --version

      - name: check fs
        run: trivy fs . 

      - name: check docker file 
        run: trivy config Dockerfile 

      - name : install python to install ruff 
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      
      - name: validate python version
        run: python --version

      - name: install ruff 
        run : pip install ruff

      - name: check ruff 
        run: ruff --version

      - name: do lint with ruff 
        run : ruff check .

      - name: build docker file 
        run : docker build -t task-img .
      
      - name: Scan Docker image
        run: trivy image task-img


      - name: change name of image 
        run : docker tag task-img task-img-artifact

      - name: save docker image
        run : docker save task-img-artifact -o task-img-artifact.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-img-artifact
          path: task-img-artifact.tar

      - name: remove image task-image-artifact
        run: docker rm -f task-img-artifact
      
      - name: Load Docker image
        run: docker load -i task-img-artifact.tar

      - name: Scan loaded image
        run: trivy image task-img-artifact

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1


      - name: Login to Amazon ECR itself 
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: retag the image tob be compatible with ecr
        run: |
          docker tag task-img:latest \
          767196576807.dkr.ecr.eu-north-1.amazonaws.com/task-img:latest

      - name: push to our repo on ecr 
        run : docker push  767196576807.dkr.ecr.eu-north-1.amazonaws.com/task-img:latest

      - name: Start container FROM IMAGE ON ECR
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            767196576807.dkr.ecr.eu-north-1.amazonaws.com/task-img:latest

      - name: Smoke test deployed app
        # Retry a few times because app startup can take a moment.
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always() # can be failed ,sucess or cancelled -> if all steps before success trigger this step , or one failed trigger this step ,or always either success or fail 
        # Clean up even if an earlier step fails.
        run: docker rm -f "${CONTAINER_NAME}" || true







